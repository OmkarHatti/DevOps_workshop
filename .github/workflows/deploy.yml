name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Zip
        run: zip -r site.zip dist

      - name: Deploy
        run: |
          curl \
          -X POST \
          -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
          -F "file=@site.zip" \
          ${{ secrets.DEPLOY_URL }}
